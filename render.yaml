# JapaneseAI — Render Blueprint (Backend .NET 8 API via Docker)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: japaneseai-api
    runtime: docker
    region: singapore
    plan: free
    branch: main
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_PROVIDER
        value: PostgreSQL
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
